<link rel="stylesheet" href="css/dokumen.css">

</head>

<body>

<script src="js/auth.js"></script>

<div class="overlay" id="overlay" onclick="closeSidebarMobile()"></div>

<div class="container">

  <div id="sidebar">
    <div class="logo-section">
      <img src="logo.png">
      <h2 class="logo-text">SIP3D</h2>
    </div>

<ul>
  <li><a href="index.html"><i class="fas fa-chart-line"></i><span>Dashboard</span></a></li>
  <li><a href="kegiatan.html"><i class="fas fa-list"></i><span>Data Kegiatan</span></a></li>
  <li><a href="input.html"><i class="fas fa-plus-circle"></i><span>Input Kegiatan</span></a></li>
  <li class="active"><a href="dokumen.html"><i class="fas fa-folder-open"></i><span>Dokumen Perda</span></a></li>
</ul>

  <main class="main-content page-wrapper">

<div id="topbar">
  <button class="toggle-btn" onclick="toggleSidebar()">
    <i class="fas fa-bars"></i>
  </button>

  <h1>Dokumen Peraturan Daerah</h1>

  <div class="profile-dropdown">
    <div class="profile-trigger" onclick="toggleProfile(event)">
      <i class="fas fa-user-circle"></i>
      <span id="loggedUser"></span>
      <i class="fas fa-chevron-down"></i>

      <a href="#" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Logout

  </div>
</div>

<!-- FILTER -->
<div class="dokumen-filter">
  <input type="text" id="searchPerda" placeholder="Cari nama perda / nomor..." />
  <select id="filterTahun">
    <option value="">Semua Tahun</option>
  </select>
</div>

<!-- GRID LIST -->
<div class="dokumen-grid" id="dokumenGrid"></div>

  </main>
</div>

<div id="bottomnav"></div>
<script>

const API_URL = "https://script.google.com/macros/s/AKfycbziTjfC3Sh0jor3rLIeUkseqQ6EUIfNjDorS8WQsSuiVsbgH27N0VyO822ezRlz_X-RQw/exec?mode=get_perda";

let DATA_PERDA = [];
let filteredData = [];

function showSkeleton(){

  const grid = document.getElementById("dokumenGrid");
  grid.innerHTML = "";

  for(let i=0;i<6;i++){
    grid.innerHTML += `
      <div class="skeleton-card">
        <div class="skeleton icon"></div>
        <div class="skeleton title"></div>
        <div class="skeleton text"></div>
        <div class="skeleton button"></div>
      </div>
    `;
  }
}

async function loadPerda() {

  showSkeleton(); // 🔥 TARUH DI SINI

  try {
    const response = await fetch(API_URL);
    DATA_PERDA = await response.json();
    filteredData = [...DATA_PERDA];

    initFilter();
    renderPerda(DATA_PERDA);

  } catch (error) {
    console.error("Gagal load perda:", error);
  }
}
document.addEventListener("DOMContentLoaded", () => {
  loadPerda();
});

function renderPerda(data){

  const grid = document.getElementById("dokumenGrid");
  grid.innerHTML = "";

  // ===== EMPTY STATE =====
  if (data.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-folder-open"></i>
        <h3>Tidak ditemukan</h3>
        <p>Data perda tidak sesuai dengan pencarian kamu.</p>
      </div>
    `;
    return;
  }

  data.forEach((perda)=>{
    grid.innerHTML += `
      <div class="dokumen-card">
        <div class="dokumen-icon">
  <svg width="60" height="60" viewBox="0 0 24 24" fill="#dc2626">
    <path d="M6 2h7l5 5v15a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z"/>
  </svg>
</div>
        <h3>${perda.judul}</h3>
        <p>Perda No ${perda.nomor} Tahun ${perda.tahun}</p>
        <span class="badge">${perda.kategori}</span>
        <a href="${perda.file}" target="_blank" class="btn-lihat">
          Lihat Dokumen
        </a>
      </div>
    `;
  });

  const cards = document.querySelectorAll(".dokumen-card");
  cards.forEach((card, i) => {
    setTimeout(() => {
      card.classList.add("show");
    }, i * 50);
  });
}

function initFilter(){

const tahunSet = new Set();
DATA_PERDA.forEach(p=>tahunSet.add(p.tahun));

const select = document.getElementById("filterTahun");

[...tahunSet].sort().forEach(t=>{
select.innerHTML += `<option value="${t}">${t}</option>`;
});

document.getElementById("searchPerda")
.addEventListener("input",applyFilter);

select.addEventListener("change",applyFilter);

}

function applyFilter(){

  const search = document.getElementById("searchPerda")
                 .value
                 .toLowerCase()
                 .trim();   // 🔥 penting

  const tahun = document.getElementById("filterTahun").value;

  filteredData = DATA_PERDA.filter(p=>{

    const matchSearch =
      search === "" ||   // kalau kosong tampil semua
      p.judul.toLowerCase().includes(search) ||
      String(p.nomor).includes(search);

    const matchTahun =
      tahun === "" || p.tahun === tahun;

    return matchSearch && matchTahun;

  });

  renderPerda(filteredData);
}


</script>


<script src="js/layout.js"></script>
<script src="js/loader.js"></script>
<script src="js/script.js"></script>

</body>
</html>
