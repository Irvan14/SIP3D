<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIP3D - Dashboard</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="icon" type="image/png" href="logo.png">

</head>

<body>
<script src="auth.js"></script>
<script src="layout.js"></script>
<script>
const user = JSON.parse(localStorage.getItem("sip3d_user"));
if (!user) {
  window.location.href = "login.html";
}
</script>

<div class="overlay" id="overlay" onclick="closeSidebarMobile()"></div>

<div class="container">

  <aside class="sidebar" id="sidebar">
    <div class="logo-section">
      <img src="logo.png">
      <h2 class="logo-text">SIP3D</h2>
    </div>

    <ul>
      <li class="active">
        <a href="index.html"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
      </li>
      <li>
        <a href="kegiatan.html"><i class="fas fa-list"></i><span>Data Kegiatan</span></a>
      </li>
      <li>
        <a href="input.html"><i class="fas fa-plus-circle"></i><span>Input Kegiatan</span></a>
      </li>
      <li>
        <a href="#"><i class="fas fa-folder-open"></i><span>Dokumen Perda</span></a>
      </li>
    </ul>
  </aside>

  <main class="main-content">

    <div class="topbar">
      <button class="toggle-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
      </button>
      <h1>Dashboard Statistik</h1>
       <div style="margin-left:auto; display:flex; gap:15px; align-items:center;">
    <span id="loggedUser"></span>
    <button onclick="logout()">Logout</button>
  </div>
    </div>

   <div class="cards">
  <div class="card">
    <h3>Total Kegiatan</h3>
    <p id="totalKegiatan">0</p>
  </div>

  <div class="card">
    <h3>Kegiatan Bulan Ini</h3>
    <p id="kegiatanBulanIni">0</p>
  </div>

  <div class="card">
    <h3>Total Dokumen</h3>
    <p id="totalDokumen">0</p>
  </div>
</div>

<div class="dashboard-filter">
  <select id="filterTahun"></select>

  <select id="filterJenis">
    <option value="ALL">Semua Jenis</option>
    <option value="Yustisi">Yustisi</option>
    <option value="Non Yustisi">Non Yustisi</option>
  </select>
</div>

    <div class="chart-container">

     <p id="lastUpdate"
     style="font-size:12px;color:#888;margin-bottom:10px;">
  </p>
      <canvas id="activityChart"></canvas>
    </div>

  </main>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbziTjfC3Sh0jor3rLIeUkseqQ6EUIfNjDorS8WQsSuiVsbgH27N0VyO822ezRlz_X-RQw/exec";

let allData = [];
let chartInstance = null;

/* ================= COUNTER ANIMATION ================= */
function animateCounter(id, target) {
  const element = document.getElementById(id);
  let start = 0;
  const duration = 800;
  const increment = target / (duration / 16);

  function update() {
    start += increment;
    if (start >= target) {
      element.textContent = target;
    } else {
      element.textContent = Math.floor(start);
      requestAnimationFrame(update);
    }
  }

  update();
}

/* ================= LOAD DATA ================= */
async function loadDashboard() {
  try {
    const response = await fetch(API_URL);
    allData = await response.json();

    initFilter();
    updateDashboard();

  } catch (error) {
    console.error("Gagal load dashboard:", error);
  }
}

/* ================= INIT FILTER ================= */
function initFilter() {
  const filterTahun = document.getElementById("filterTahun");
  const tahunSet = new Set();

  allData.forEach(row => {
    const tanggal = new Date(row[1]);
    tahunSet.add(tanggal.getFullYear());
  });

  filterTahun.innerHTML = "";
  [...tahunSet].sort().forEach(tahun => {
    filterTahun.innerHTML += `<option value="${tahun}">${tahun}</option>`;
  });

  filterTahun.addEventListener("change", updateDashboard);
  document.getElementById("filterJenis")
          .addEventListener("change", updateDashboard);
}

/* ================= UPDATE DASHBOARD ================= */
function updateDashboard() {

  document.getElementById("lastUpdate").textContent =
    "Terakhir diperbarui: " + new Date().toLocaleTimeString("id-ID");

  const tahunFilter = document.getElementById("filterTahun").value;
  const jenisFilter = document.getElementById("filterJenis").value;

  let filtered = allData.filter(row => {
    const tanggal = new Date(row[1]);
    const jenis = row[2];

    const matchTahun = tanggal.getFullYear() == tahunFilter;
    const matchJenis = jenisFilter === "ALL" || jenis === jenisFilter;

    return matchTahun && matchJenis;
  });

  /* ===== KPI ===== */
  animateCounter("totalKegiatan", filtered.length);

  const bulanSekarang = new Date().getMonth();
  const tahunSekarang = new Date().getFullYear();

  const kegiatanBulanIni = filtered.filter(row => {
    const t = new Date(row[1]);
    return t.getMonth() === bulanSekarang &&
           t.getFullYear() === tahunSekarang;
  }).length;

  animateCounter("kegiatanBulanIni", kegiatanBulanIni);

  const totalDokumen = filtered.filter(row => row[6] || row[7]).length;
  animateCounter("totalDokumen", totalDokumen);

  generateChart(filtered);
}

/* ================= GENERATE CHART ================= */
function generateChart(data) {

  const bulanCount = Array(12).fill(0);

  data.forEach(row => {
    const tanggal = new Date(row[1]);
    bulanCount[tanggal.getMonth()]++;
  });

  const ctx = document.getElementById("activityChart").getContext("2d");

  if (chartInstance) chartInstance.destroy();

  chartInstance = new Chart(ctx, {
    type: "line",
    data: {
      labels: ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"],
      datasets: [{
        label: "Jumlah Kegiatan",
        data: bulanCount,
        borderColor: "#4f46e5",
        borderWidth: 3,
        pointRadius: 5,
        pointHoverRadius: 8,
        backgroundColor: (context) => {
          const gradient = context.chart.ctx.createLinearGradient(0, 0, 0, 400);
          gradient.addColorStop(0, "rgba(79,70,229,0.4)");
          gradient.addColorStop(1, "rgba(79,70,229,0.05)");
          return gradient;
        },
        tension: 0.4,
        fill: true
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      devicePixelRatio: 2,
      animation: {
        duration: 1200,
        easing: "easeOutQuart"
      },
      interaction: {
        mode: "index",
        intersect: false
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#1e293b",
          titleColor: "#fff",
          bodyColor: "#fff",
          padding: 12,
          borderRadius: 8
        }
      },
      scales: {
        x: {
          ticks: {
            color: "#64748b",
            font: { size: 13, weight: "500" }
          },
          grid: { display: false }
        },
        y: {
          ticks: {
            color: "#64748b",
            font: { size: 13 }
          },
          grid: { color: "rgba(0,0,0,0.05)" }
        }
      }
    }
  });
}

/* ================= AUTO REFRESH ================= */
async function refreshData() {
  try {
    const response = await fetch(API_URL);
    allData = await response.json();
    updateDashboard();
  } catch (error) {
    console.error("Gagal refresh:", error);
  }
}

/* INIT */
loadDashboard();
setInterval(refreshData, 10000);

</script>
</body>
</html>
