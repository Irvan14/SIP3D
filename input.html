<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Input Kegiatan</title>

<link rel="icon" href="logo.png">

<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/input.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<script src="js/auth.js"></script>

<div class="overlay" id="overlay" onclick="closeSidebarMobile()"></div>

<div class="container">

<div id="sidebar"></div>

<main class="main-content page-wrapper">

<div id="topbar"></div>

<div class="form-card">

<form id="kegiatanForm">
  
<input type="hidden" name="foto_url" id="fotoURL">
<iframe name="hidden_iframe" style="display:none;"></iframe>
<input type="hidden" name="mode" value="save_with_upload">

<div class="form-section">

<h3>Informasi Kegiatan</h3>

<div class="form-grid">

<div class="form-group">
<input type="date" name="tanggal" required>
<label>Tanggal</label>
</div>

<div class="form-group">
<select name="jenis" required>
<option value="" disabled selected hidden></option>
<option value="Yustisi">Yustisi</option>
<option value="Non Yustisi">Non Yustisi</option>
</select>
<label>Jenis Penindakan</label>
</div>

<div class="form-group">
<input type="text" name="lokasi" required>
<label>Lokasi</label>
</div>

<div class="form-group">
<input type="text" name="tim" required>
<label>Tim</label>
</div>

<div class="form-group full">
<textarea name="uraian" required></textarea>
<label>Berita Penindakan</label>
</div>

</div>

</div>

<div class="form-section">

<h3>Dokumentasi</h3>

<div class="upload-area">
  <input type="file" id="fotoInput" name="foto">

  <label for="fotoInput" class="upload-box">
    <i class="fas fa-cloud-upload-alt"></i>
    <span>Pilih Foto</span>
  </label>

  <img id="previewFoto" style="display:none;max-width:200px;margin-top:10px;">
</div>

</div>

</div>

<button type="submit" class="submit-btn">

<i class="fas fa-save"></i>
Simpan

</button>

</form>

</div>

</main>

</div>

<div id="bottomnav"></div>

<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script src="js/loader.js"></script>
<script src="js/script.js"></script>
<script src="js/router.js"></script>

</body>
</html>
