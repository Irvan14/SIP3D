<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Kegiatan - SIP3D</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/input.css">
  <link rel="icon" type="image/png" href="logo.png">
</head>

<body>
<script src="auth.js"></script>
<script>
const user = JSON.parse(localStorage.getItem("sip3d_user"));
if (!user) {
  window.location.href = "login.html";
}
</script>

<div class="overlay" id="overlay" onclick="closeSidebarMobile()"></div>

<div class="container">

  <aside class="sidebar" id="sidebar">
    <div class="logo-section">
      <img src="logo.png">
      <h2 class="logo-text">SIP3D</h2>
    </div>

    <ul>
      <li><a href="index.html"><i class="fas fa-chart-line"></i><span>Dashboard</span></a></li>
      <li><a href="kegiatan.html"><i class="fas fa-list"></i><span>Data Kegiatan</span></a></li>
      <li class="active"><a href="input.html"><i class="fas fa-plus-circle"></i><span>Input Kegiatan</span></a></li>
      <li><a href="#"><i class="fas fa-folder-open"></i><span>Dokumen Perda</span></a></li>
    </ul>
  </aside>

  <main class="main-content">

    <div class="topbar">
      <button class="toggle-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
      </button>
      <h1>Input Kegiatan</h1>
       <div style="margin-left:auto; display:flex; gap:15px; align-items:center;">
    <span id="loggedUser"></span>
    <button onclick="logout()">Logout</button>
  </div>
    </div>

   <div class="form-card">

  <form id="kegiatanForm">

    <div class="form-group full">
      <label>Tanggal</label>
      <input type="date" name="tanggal" required>
    </div>

    <div class="form-group">
      <label>Jenis Kegiatan</label>
      <select name="jenis" required>
        <option value="">Pilih Jenis</option>
        <option value="Yustisi">Yustisi</option>
        <option value="Non Yustisi">Non Yustisi</option>
      </select>
    </div>

    <div class="form-group">
      <label>Lokasi</label>
      <input type="text" name="lokasi" placeholder="Contoh: Pasar Kroya" required>
    </div>

    <div class="form-group">
      <label>Tim Pelaksana</label>
      <input type="text" name="tim" required>
    </div>

    <div class="form-group full">
      <label>Uraian Kegiatan</label>
      <textarea name="uraian" required></textarea>
    </div>

    <div class="form-group full">
  <label>Upload Dokumentasi (Foto)</label>
  <input type="file" id="fileInput" accept="image/*">
</div>

    <button type="submit" class="submit-btn">
      <i class="fas fa-save"></i> Simpan Data
    </button>

  </form>

</div>
<div id="toast" class="toast"></div>

  </main>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbziTjfC3Sh0jor3rLIeUkseqQ6EUIfNjDorS8WQsSuiVsbgH27N0VyO822ezRlz_X-RQw/exec";

document.addEventListener("DOMContentLoaded", function () {

  const form = document.getElementById("kegiatanForm");
  const button = form.querySelector(".submit-btn");
  const toast = document.getElementById("toast");

  function showToast(message, type="success") {
    toast.textContent = message;
    toast.className = "toast show " + type;

    setTimeout(() => {
      toast.classList.remove("show");
    }, 3000);
  }

  form.addEventListener("submit", async function(e) {
    e.preventDefault();

    // Loading State
    button.disabled = true;
    button.innerHTML = `<span class="spinner"></span> Menyimpan...`;

    const formData = new FormData();

    formData.append("tanggal", form.tanggal.value);
    formData.append("jenis", form.jenis.value);
    formData.append("lokasi", form.lokasi.value);
    formData.append("uraian", form.uraian.value);
    formData.append("tim", form.tim.value);
    formData.append("input_oleh", "Admin SIP3D");

    const fileInput = document.getElementById("fileInput");
    let base64File = "";

// BATASI MAKSIMAL 1MB
if (fileInput.files.length > 0) {

  const file = fileInput.files[0];

  if (file.size > 1024 * 1024) {
    showToast("Ukuran foto maksimal 1MB ❌", "error");
    button.disabled = false;
    button.innerHTML = `<i class="fas fa-save"></i> Simpan Data`;
    return;
  }

  base64File = await new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.readAsDataURL(file);
  });
}

const data = {
  tanggal: form.tanggal.value,
  jenis: form.jenis.value,
  lokasi: form.lokasi.value,
  uraian: form.uraian.value,
  tim: form.tim.value,
  file: base64File,
  fileName: fileInput.files[0]?.name || "",
  input_oleh: "Admin SIP3D"
};


    try {
// 1. Upload foto dulu
if (fileInput.files.length > 0) {

  const base64 = await new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.readAsDataURL(fileInput.files[0]);
  });

  const uploadRes = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({
      mode: "upload",
      file: base64,
      fileName: fileInput.files[0].name
    })
  });

  const uploadData = await uploadRes.json();
  var linkFoto = uploadData.url;
} else {
  var linkFoto = "";
}

const response = await fetch(API_URL, {
  method: "POST",
  headers: { "Content-Type": "text/plain" },
  body: JSON.stringify({
    mode: "save",
    tanggal: form.tanggal.value,
    jenis: form.jenis.value,
    lokasi: form.lokasi.value,
    uraian: form.uraian.value,
    tim: form.tim.value,
    link_dokumentasi: linkFoto,
    input_oleh: "Admin SIP3D"
  })
});
      const result = await response.json();

      if (result.status === "success") {
        showToast("Data berhasil disimpan ✅", "success");
        form.reset();
      } else {
        showToast("Gagal menyimpan data ❌", "error");
      }

    } catch (error) {
      showToast("Koneksi bermasalah ❌", "error");
      console.error(error);
    }

    // Kembalikan tombol
    button.disabled = false;
    button.innerHTML = `<i class="fas fa-save"></i> Simpan Data`;

  });

});
</script>
<script src="layout.js"></script>
<script>
function logout() {
  localStorage.removeItem("sip3d_user");
  window.location.href = "login.html";
}
</script>
</body>
</html>
