<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Kegiatan - SIP3D</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/input.css">
  <link rel="icon" type="image/png" href="logo.png">
</head>

<body>
<script src="auth.js"></script>
<script>
const user = JSON.parse(localStorage.getItem("sip3d_user"));
if (!user) {
  window.location.href = "login.html";
}
</script>

<div class="overlay" id="overlay" onclick="closeSidebarMobile()"></div>

<div class="container">

  <aside class="sidebar" id="sidebar">
    <div class="logo-section">
      <img src="logo.png">
      <h2 class="logo-text">SIP3D</h2>
    </div>

    <ul>
      <li><a href="index.html"><i class="fas fa-chart-line"></i><span>Dashboard</span></a></li>
      <li><a href="kegiatan.html"><i class="fas fa-list"></i><span>Data Kegiatan</span></a></li>
      <li class="active"><a href="input.html"><i class="fas fa-plus-circle"></i><span>Input Kegiatan</span></a></li>
      <li><a href="dokumen.html"><i class="fas fa-folder-open"></i><span>Dokumen Perda</span></a></li>
    </ul>
  </aside>

  <main class="main-content page-wrapper">

    <div class="topbar">
      <button class="toggle-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
      </button>
      <h1>Input Kegiatan</h1>
       <div class="profile-dropdown">
  <div class="profile-trigger" onclick="toggleProfile(event)">
    <i class="fas fa-user-circle"></i>
    <span id="loggedUser"></span>
    <i class="fas fa-chevron-down"></i>
  </div>

  <div class="profile-menu" id="profileMenu">
    <a href="#" onclick="logout()">
      <i class="fas fa-sign-out-alt"></i> Logout
    </a>
  </div>
</div>
    </div>

   <div class="form-card">

  <form id="kegiatanForm">

    <!-- ===== SECTION 1 ===== -->
    <div class="form-section">
      <h3>Informasi Kegiatan</h3>

      <div class="form-grid">

        <div class="form-group">
          <input type="date" name="tanggal" required>
          <label>Tanggal</label>
        </div>

        <div class="form-group">
          <select name="jenis" required>
            <option value="" disabled selected hidden></option>
            <option value="Yustisi">Yustisi</option>
            <option value="Non Yustisi">Non Yustisi</option>
          </select>
          <label>Jenis Penindakan</label>
        </div>

        <div class="form-group">
          <input type="text" name="lokasi" required>
          <label>Lokasi</label>
        </div>

        <div class="form-group">
          <input type="text" name="tim" required>
          <label>Tim Pelaksana</label>
        </div>

        <div class="form-group full">
          <textarea name="uraian" required></textarea>
          <label>Berita Penindakan</label>
        </div>

      </div>
    </div>

    <!-- ===== SECTION 2 ===== -->
    <div class="form-section">
      <h3>Dokumentasi</h3>

      <div class="upload-box" id="uploadBox">
        <i class="fas fa-cloud-upload-alt"></i>
        <p>Drag & Drop Foto atau Klik untuk Upload</p>
        <input type="file" id="fileInput" accept="image/*">
      </div>
    </div>

    <button type="submit" class="submit-btn">
      <i class="fas fa-save"></i> Simpan Data
    </button>

  </form>
</div>

<div id="toast" class="toast"></div>
<div id="successOverlay" class="success-overlay">
  <div class="success-box">
    <div class="checkmark">
      <div class="checkmark-circle"></div>
      <div class="checkmark-stem"></div>
      <div class="checkmark-kick"></div>
    </div>
    <h2>Berhasil Disimpan!</h2>
    <p>Data kegiatan telah masuk ke sistem.</p>
  </div>
</div>

  </main>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbziTjfC3Sh0jor3rLIeUkseqQ6EUIfNjDorS8WQsSuiVsbgH27N0VyO822ezRlz_X-RQw/exec";

document.addEventListener("DOMContentLoaded", function () {

  const form = document.getElementById("kegiatanForm");
  const button = form.querySelector(".submit-btn");
  const toast = document.getElementById("toast");

  function showToast(message, type="success") {
    toast.textContent = message;
    toast.className = "toast show " + type;

    setTimeout(() => {
      toast.classList.remove("show");
    }, 3000);
  }

  form.addEventListener("submit", async function(e) {
    e.preventDefault();

    // Loading State
    button.disabled = true;
    button.innerHTML = `<span class="spinner"></span> Menyimpan...`;

    const formData = new FormData();

    formData.append("tanggal", form.tanggal.value);
    formData.append("jenis", form.jenis.value);
    formData.append("lokasi", form.lokasi.value);
    formData.append("uraian", form.uraian.value);
    formData.append("tim", form.tim.value);
    formData.append("input_oleh", "Admin SIP3D");

    const fileInput = document.getElementById("fileInput");
    let base64File = "";

// BATASI MAKSIMAL 1MB
if (fileInput.files.length > 0) {

  const file = fileInput.files[0];

  if (file.size > 1024 * 1024) {
    showToast("Ukuran foto maksimal 1MB ❌", "error");
    button.disabled = false;
    button.innerHTML = `<i class="fas fa-save"></i> Simpan Data`;
    return;
  }

  base64File = await new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.readAsDataURL(file);
  });
}

const data = {
  tanggal: form.tanggal.value,
  jenis: form.jenis.value,
  lokasi: form.lokasi.value,
  uraian: form.uraian.value,
  tim: form.tim.value,
  file: base64File,
  fileName: fileInput.files[0]?.name || "",
  input_oleh: "Admin SIP3D"
};


    try {
// 1. Upload foto dulu
if (fileInput.files.length > 0) {

  const base64 = await new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.readAsDataURL(fileInput.files[0]);
  });

  const uploadRes = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({
      mode: "upload",
      file: base64,
      fileName: fileInput.files[0].name
    })
  });

  const uploadData = await uploadRes.json();
  var linkFoto = uploadData.url;
} else {
  var linkFoto = "";
}

const response = await fetch(API_URL, {
  method: "POST",
  headers: { "Content-Type": "text/plain" },
  body: JSON.stringify({
    mode: "save",
    tanggal: form.tanggal.value,
    jenis: form.jenis.value,
    lokasi: form.lokasi.value,
    uraian: form.uraian.value,
    tim: form.tim.value,
    link_dokumentasi: linkFoto,
    input_oleh: "Admin SIP3D"
  })
});
      const result = await response.json();

      if (result.status === "success") {

  form.reset();

  const overlay = document.getElementById("successOverlay");
  overlay.classList.add("active");

  setTimeout(() => {
    overlay.classList.remove("active");
  }, 2500);
} else {
        showToast("Gagal menyimpan data ❌", "error");
      }

    } catch (error) {
      showToast("Koneksi bermasalah ❌", "error");
      console.error(error);
    }

    // Kembalikan tombol
    button.disabled = false;
    button.innerHTML = `<i class="fas fa-save"></i> Simpan Data`;

  });

});

document.querySelectorAll(".form-group select").forEach(select => {

  function checkValue() {
    if(select.value !== ""){
      select.classList.add("has-value");
    } else {
      select.classList.remove("has-value");
    }
  }

  select.addEventListener("change", checkValue);
  checkValue(); // auto run saat load
});
</script>
<script src="layout.js"></script>
<script>
function logout() {
  localStorage.removeItem("sip3d_user");
  window.location.href = "login.html";
}
</script>

<div class="mobile-nav">
  <a href="index.html">
    <i class="fas fa-chart-line"></i>
    <span>Dashboard</span>
  </a>
  <a href="kegiatan.html">
    <i class="fas fa-list"></i>
    <span>Data</span>
  </a>
  <a href="input.html" class="active">
    <i class="fas fa-plus-circle"></i>
    <span>Input</span>
  </a>
</div>

<a href="input.html" class="fab">
  <i class="fas fa-plus"></i>
</a>
</body>
</html>
